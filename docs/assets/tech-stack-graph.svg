  </defs>

  <rect width="960" height="560" rx="28" fill="#F4F7FB"/>
  <text x="48" y="56" class="title">TriageAI Tech Stack</text>

  <rect x="90" y="100" width="300" height="90" rx="22" fill="#FFFFFF" stroke="#D7E1EA" stroke-width="2"/>
